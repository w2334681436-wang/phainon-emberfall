plugins { id 'com.android.application' }

android {
    namespace 'com.wxy.ashenfrontier.stable'
    compileSdk 35

    defaultConfig {
        applicationId 'com.wxy.ashenfrontier.stable'
        minSdk 23
        targetSdk 35
        versionCode 122
        versionName '1.2.2'
    }

    buildTypes {
        release {
            debuggable false
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    androidResources {
        noCompress += ['js', 'css', 'html']
    }
}
