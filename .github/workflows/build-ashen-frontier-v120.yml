name: Build Ashen Frontier APK v1.2

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/ashen-apk-v120/**'
      - '.github/workflows/build-ashen-frontier-v120.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Reconstruct and verify game source
        shell: bash
        run: |
          set -euo pipefail
          ROOT='tools/ashen-apk-v120/work'
          WEB="$ROOT/web"
          rm -rf "$ROOT"
          mkdir -p "$WEB"
          cat \
            tools/ashen-apk/source.part00 \
            tools/ashen-apk/source.part01 \
            tools/ashen-apk/source.part02 \
            tools/ashen-apk/source.part03 \
            tools/ashen-apk/source.part04 \
            tools/ashen-apk/source.part05a \
            tools/ashen-apk/source.part05b \
            tools/ashen-apk/source.part05c \
            | base64 --decode > /tmp/ashen-v100.tar.xz
          echo '78305419d883c75c77a2e3ff7eb54493405b2de44bba8735ea8fa4de7470b225  /tmp/ashen-v100.tar.xz' | sha256sum --check
          tar -xJf /tmp/ashen-v100.tar.xz -C "$WEB"
          cat tools/ashen-apk-v110/patch.safe15.0{0,1,2,3,4} > /tmp/ashen-v110.patch
          (cd "$WEB" && git apply --check /tmp/ashen-v110.patch && git apply /tmp/ashen-v110.patch)
          cat tools/ashen-apk-v120/update.part{00,01,02} | base64 --decode | gzip -dc > /tmp/ashen-v120.patch
          (cd "$WEB" && patch --batch --forward -p1 < /tmp/ashen-v120.patch)
          test "$(node -p "require('./$WEB/package.json').version")" = '1.2.0'
          grep -q "GAME_VERSION = '1.2.0'" "$WEB/src/data.js"
          test -s "$WEB/src/art.js"
          test -s "$WEB/src/effects.js"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tools/ashen-apk-v120/work/web/package-lock.json

      - name: Build production web game
        working-directory: tools/ashen-apk-v120/work/web
        run: |
          npm ci --no-audit --no-fund
          npm run build
          test -s dist/index.html
          test -n "$(find dist/assets -name '*.js' -print -quit)"
          test -n "$(find dist/assets -name '*.css' -print -quit)"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate immersive Android wrapper
        shell: bash
        run: |
          set -euo pipefail
          ROOT='tools/ashen-apk-v120/work/android'
          MAIN="$ROOT/app/src/main"
          mkdir -p "$MAIN/java/com/openai/ashenfrontier/v12" "$MAIN/res/values" "$MAIN/res/drawable" "$MAIN/assets/game"
          cp -R tools/ashen-apk-v120/work/web/dist/. "$MAIN/assets/game/"
          cat > "$ROOT/settings.gradle" <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'AshenFrontierV12'
          include ':app'
          EOF
          cat > "$ROOT/build.gradle" <<'EOF'
          plugins { id 'com.android.application' version '8.7.3' apply false }
          EOF
          cat > "$ROOT/gradle.properties" <<'EOF'
          org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          android.enableJetifier=false
          EOF
          cat > "$ROOT/app/build.gradle" <<'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.openai.ashenfrontier.v12'
              compileSdk 35
              defaultConfig {
                  applicationId 'com.openai.ashenfrontier.v12'
                  minSdk 24
                  targetSdk 35
                  versionCode 120
                  versionName '1.2.0'
              }
              buildTypes {
                  debug { debuggable false; minifyEnabled false }
                  release { minifyEnabled false }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF
          cat > "$MAIN/AndroidManifest.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <uses-feature android:glEsVersion="0x00020000" android:required="true" />
              <application
                  android:allowBackup="true"
                  android:hardwareAccelerated="true"
                  android:largeHeap="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden|uiMode|screenLayout|smallestScreenSize"
                      android:enableOnBackInvokedCallback="false"
                      android:exported="true"
                      android:screenOrientation="sensorLandscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          cat > "$MAIN/res/values/strings.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">灰烬边境 v1.2</string></resources>
          EOF
          cat > "$MAIN/res/values/styles.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowActionModeOverlay">true</item>
                  <item name="android:windowBackground">#070A09</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowDisablePreview">false</item>
                  <item name="android:colorAccent">#D7B26D</item>
                  <item name="android:navigationBarColor">#000000</item>
                  <item name="android:statusBarColor">#000000</item>
              </style>
          </resources>
          EOF
          cat > "$MAIN/res/drawable/ic_launcher.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#08100E" android:pathData="M0,0h108v108h-108z" />
              <path android:fillColor="#D7B26D" android:pathData="M54,10L98,94H10Z" />
              <path android:fillColor="#14221D" android:pathData="M49,33h10v37h-10zM49,78h10v10h-10z" />
              <path android:fillColor="#7AC5A0" android:pathData="M20,94h68v5h-68z" />
          </vector>
          EOF
          cat > "$MAIN/java/com/openai/ashenfrontier/v12/MainActivity.java" <<'EOF'
          package com.openai.ashenfrontier.v12;
          import android.app.Activity;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override protected void onCreate(Bundle state) {
                  super.onCreate(state);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON | WindowManager.LayoutParams.FLAG_HARDWARE_ACCELERATED);
                  hideSystemBars();
                  webView = new WebView(this);
                  webView.setBackgroundColor(Color.rgb(7, 10, 9));
                  webView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                  webView.setOverScrollMode(View.OVER_SCROLL_NEVER);
                  webView.setHorizontalScrollBarEnabled(false);
                  webView.setVerticalScrollBarEnabled(false);
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setCacheMode(WebSettings.LOAD_DEFAULT);
                  s.setBuiltInZoomControls(false);
                  s.setDisplayZoomControls(false);
                  s.setSupportZoom(false);
                  s.setUseWideViewPort(true);
                  s.setLoadWithOverviewMode(false);
                  s.setTextZoom(100);
                  WebView.setWebContentsDebuggingEnabled(false);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  if (state == null) webView.loadUrl("file:///android_asset/game/index.html");
                  else webView.restoreState(state);
              }
              private void hideSystemBars() {
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY |
                      View.SYSTEM_UI_FLAG_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_LAYOUT_STABLE);
              }
              @Override public void onWindowFocusChanged(boolean focus) { super.onWindowFocusChanged(focus); if (focus) hideSystemBars(); }
              @Override public void onBackPressed() {
                  if (webView == null) { super.onBackPressed(); return; }
                  webView.evaluateJavascript("Boolean(window.__ashenHandleBack && window.__ashenHandleBack())", value -> {
                      if (!"true".equals(value)) {
                          if (webView.canGoBack()) webView.goBack();
                          else MainActivity.super.onBackPressed();
                      }
                  });
              }
              @Override protected void onSaveInstanceState(Bundle out) { if (webView != null) webView.saveState(out); super.onSaveInstanceState(out); }
              @Override protected void onPause() {
                  if (webView != null) {
                      webView.evaluateJavascript("window.dispatchEvent(new Event('pagehide'))", null);
                      webView.onPause(); webView.pauseTimers();
                  }
                  super.onPause();
              }
              @Override protected void onResume() { super.onResume(); if (webView != null) { webView.resumeTimers(); webView.onResume(); } hideSystemBars(); }
              @Override public void onTrimMemory(int level) { super.onTrimMemory(level); if (webView != null && level >= TRIM_MEMORY_RUNNING_LOW) webView.clearCache(false); }
              @Override protected void onDestroy() {
                  if (webView != null) {
                      webView.loadUrl("about:blank"); webView.stopLoading(); webView.removeAllViews(); webView.destroy(); webView = null;
                  }
                  super.onDestroy();
              }
          }
          EOF

      - name: Compile signed installable APK
        working-directory: tools/ashen-apk-v120/work/android
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Verify APK and stage release
        shell: bash
        run: |
          set -euo pipefail
          OUT='tools/ashen-apk-v120/output'
          APK='tools/ashen-apk-v120/work/android/app/build/outputs/apk/debug/app-debug.apk'
          mkdir -p "$OUT"
          cp "$APK" "$OUT/灰烬边境-v1.2.0-Android.apk"
          unzip -t "$OUT/灰烬边境-v1.2.0-Android.apk"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$OUT/灰烬边境-v1.2.0-Android.apk"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$OUT/灰烬边境-v1.2.0-Android.apk" | tee "$OUT/APK信息.txt"
          grep -q "versionName='1.2.0'" "$OUT/APK信息.txt"
          unzip -p "$OUT/灰烬边境-v1.2.0-Android.apk" assets/game/index.html | grep -q 'assets/index-'
          sha256sum "$OUT/灰烬边境-v1.2.0-Android.apk" > "$OUT/SHA256.txt"
          (cd tools/ashen-apk-v120/work && zip -qr ../output/灰烬边境-v1.2.0-Android工程.zip android)
          (cd tools/ashen-apk-v120/work/web && zip -qr ../../output/灰烬边境-v1.2.0-网页源码.zip README.md index.html package.json package-lock.json vite.config.js src)

      - name: Upload v1.2 release files
        uses: actions/upload-artifact@v4
        with:
          name: ashen-frontier-v1.2.0-android
          path: tools/ashen-apk-v120/output/*
          if-no-files-found: error
          retention-days: 14
