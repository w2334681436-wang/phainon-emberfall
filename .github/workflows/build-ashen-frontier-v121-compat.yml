name: Build Ashen Frontier APK v1.2.1 Compat

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/ashen-apk-v120/**'
      - '.github/workflows/build-ashen-frontier-v121-compat.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Reconstruct complete v1.2 source
        shell: bash
        run: |
          set -euo pipefail
          ROOT='tools/ashen-apk-v121-compat/work'
          RAW="$ROOT/raw"
          WEB="$ROOT/web"
          rm -rf "$ROOT"
          mkdir -p "$RAW" "$WEB"

          base64 --decode tools/ashen-apk-v120/source.part00 > /tmp/ashen-v120-source.tar.xz
          xz --test /tmp/ashen-v120-source.tar.xz
          tar -xJf /tmp/ashen-v120-source.tar.xz -C "$RAW"

          PACKAGE_JSON="$(find "$RAW" -maxdepth 4 -type f -name package.json -print -quit)"
          test -n "$PACKAGE_JSON"
          SOURCE_ROOT="$(dirname "$PACKAGE_JSON")"
          cp -a "$SOURCE_ROOT"/. "$WEB"/

          test -s "$WEB/package.json"
          test -s "$WEB/src/main.js"
          test -s "$WEB/src/art.js"
          test -s "$WEB/src/effects.js"
          node -e "const p=require('./$WEB/package.json'); if(p.version!=='1.2.0') throw new Error('Unexpected source version: '+p.version)"
          printf '1.2.1-android-compat\n' > "$WEB/ANDROID_BUILD_VERSION.txt"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tools/ashen-apk-v121-compat/work/web/package-lock.json

      - name: Build production web game
        working-directory: tools/ashen-apk-v121-compat/work/web
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm run build
          test -s dist/index.html
          JS_FILE="$(find dist/assets -type f -name '*.js' -print -quit)"
          CSS_FILE="$(find dist/assets -type f -name '*.css' -print -quit)"
          test -n "$JS_FILE"
          test -n "$CSS_FILE"
          test "$(stat -c%s "$JS_FILE")" -gt 500000

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate clean Android project
        shell: bash
        run: |
          set -euo pipefail
          ROOT='tools/ashen-apk-v121-compat/work/android'
          MAIN="$ROOT/app/src/main"
          JAVA="$MAIN/java/com/wxy/ashenfrontier/compat"
          mkdir -p "$JAVA" "$MAIN/res/values" "$MAIN/res/drawable" "$MAIN/assets/game"
          cp -a tools/ashen-apk-v121-compat/work/web/dist/. "$MAIN/assets/game/"

          cat > "$ROOT/settings.gradle" <<'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'AshenFrontierCompat'
          include ':app'
          EOF

          cat > "$ROOT/build.gradle" <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          cat > "$ROOT/gradle.properties" <<'EOF'
          org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          android.enableJetifier=false
          EOF

          cat > "$ROOT/app/build.gradle" <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.wxy.ashenfrontier.compat'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.wxy.ashenfrontier.compat'
                  minSdk 23
                  targetSdk 35
                  versionCode 121
                  versionName '1.2.1'
              }

              buildTypes {
                  release {
                      debuggable false
                      minifyEnabled false
                      shrinkResources false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          cat > "$MAIN/AndroidManifest.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:hardwareAccelerated="true"
                  android:largeHeap="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden|uiMode|screenLayout|smallestScreenSize"
                      android:enableOnBackInvokedCallback="false"
                      android:exported="true"
                      android:resizeableActivity="true"
                      android:screenOrientation="sensorLandscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > "$MAIN/res/values/strings.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">灰烬边境 修复版</string>
          </resources>
          EOF

          cat > "$MAIN/res/values/styles.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowActionModeOverlay">true</item>
                  <item name="android:windowBackground">#070A09</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowDisablePreview">false</item>
                  <item name="android:colorAccent">#D7B26D</item>
                  <item name="android:navigationBarColor">#000000</item>
                  <item name="android:statusBarColor">#000000</item>
              </style>
          </resources>
          EOF

          cat > "$MAIN/res/drawable/ic_launcher.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#08100E" android:pathData="M0,0h108v108h-108z" />
              <path android:fillColor="#D7B26D" android:pathData="M54,10L98,94H10Z" />
              <path android:fillColor="#14221D" android:pathData="M49,33h10v37h-10zM49,78h10v10h-10z" />
              <path android:fillColor="#7AC5A0" android:pathData="M20,94h68v5h-68z" />
          </vector>
          EOF

          cat > "$JAVA/MainActivity.java" <<'EOF'
          package com.wxy.ashenfrontier.compat;

          import android.app.Activity;
          import android.graphics.Color;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowInsets;
          import android.view.WindowInsetsController;
          import android.view.WindowManager;
          import android.webkit.RenderProcessGoneDetail;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle state) {
                  super.onCreate(state);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON | WindowManager.LayoutParams.FLAG_HARDWARE_ACCELERATED);
                  hideSystemBars();
                  createWebView(state);
              }

              private void createWebView(Bundle state) {
                  webView = new WebView(this);
                  webView.setBackgroundColor(Color.rgb(7, 10, 9));
                  webView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                  webView.setOverScrollMode(View.OVER_SCROLL_NEVER);
                  webView.setHorizontalScrollBarEnabled(false);
                  webView.setVerticalScrollBarEnabled(false);
                  setContentView(webView);

                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setCacheMode(WebSettings.LOAD_DEFAULT);
                  s.setBuiltInZoomControls(false);
                  s.setDisplayZoomControls(false);
                  s.setSupportZoom(false);
                  s.setUseWideViewPort(true);
                  s.setLoadWithOverviewMode(false);
                  s.setTextZoom(100);
                  s.setUserAgentString(s.getUserAgentString() + " AshenFrontierAndroid/1.2.1");

                  WebView.setWebContentsDebuggingEnabled(false);
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean onRenderProcessGone(WebView view, RenderProcessGoneDetail detail) {
                          if (webView != null) {
                              webView.destroy();
                              webView = null;
                          }
                          createWebView(null);
                          return true;
                      }
                  });

                  if (state == null || webView.restoreState(state) == null) {
                      webView.loadUrl("file:///android_asset/game/index.html");
                  }
              }

              private void hideSystemBars() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      WindowInsetsController controller = getWindow().getInsetsController();
                      if (controller != null) {
                          controller.hide(WindowInsets.Type.statusBars() | WindowInsets.Type.navigationBars());
                          controller.setSystemBarsBehavior(WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE);
                      }
                  } else {
                      getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY |
                          View.SYSTEM_UI_FLAG_FULLSCREEN |
                          View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                          View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN |
                          View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION |
                          View.SYSTEM_UI_FLAG_LAYOUT_STABLE);
                  }
              }

              @Override
              public void onWindowFocusChanged(boolean focus) {
                  super.onWindowFocusChanged(focus);
                  if (focus) hideSystemBars();
              }

              @Override
              public void onBackPressed() {
                  if (webView == null) {
                      super.onBackPressed();
                      return;
                  }
                  webView.evaluateJavascript("Boolean(window.__ashenHandleBack && window.__ashenHandleBack())", value -> {
                      if (!"true".equals(value)) {
                          if (webView.canGoBack()) webView.goBack();
                          else moveTaskToBack(true);
                      }
                  });
              }

              @Override
              protected void onSaveInstanceState(Bundle out) {
                  if (webView != null) webView.saveState(out);
                  super.onSaveInstanceState(out);
              }

              @Override
              protected void onPause() {
                  if (webView != null) {
                      webView.evaluateJavascript("window.dispatchEvent(new Event('pagehide'))", null);
                      webView.onPause();
                      webView.pauseTimers();
                  }
                  super.onPause();
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  if (webView != null) {
                      webView.resumeTimers();
                      webView.onResume();
                  }
                  hideSystemBars();
              }

              @Override
              protected void onDestroy() {
                  if (webView != null) {
                      webView.loadUrl("about:blank");
                      webView.stopLoading();
                      webView.removeAllViews();
                      webView.destroy();
                      webView = null;
                  }
                  super.onDestroy();
              }
          }
          EOF

      - name: Compile unsigned release APK
        working-directory: tools/ashen-apk-v121-compat/work/android
        run: gradle --no-daemon --stacktrace :app:assembleRelease

      - name: Align and sign with v1 v2 v3 schemes
        shell: bash
        run: |
          set -euo pipefail
          ROOT='tools/ashen-apk-v121-compat/work/android'
          OUT='tools/ashen-apk-v121-compat/output'
          UNSIGNED="$ROOT/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="$OUT/ashen-frontier-v121-aligned.apk"
          FINAL="$OUT/灰烬边境-v1.2.1-修复安装版.apk"
          KEYSTORE="$OUT/灰烬边境-v1.2.1-签名密钥.jks"
          mkdir -p "$OUT"

          keytool -genkeypair -noprompt \
            -keystore "$KEYSTORE" \
            -storepass 'AshenFrontier_2026' \
            -keypass 'AshenFrontier_2026' \
            -alias ashenfrontier \
            -keyalg RSA -keysize 4096 -validity 10000 \
            -dname 'CN=Ashen Frontier, OU=Android Game, O=WXY, L=Local, ST=NA, C=US'

          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -f -p 4 "$UNSIGNED" "$ALIGNED"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias ashenfrontier \
            --ks-pass pass:AshenFrontier_2026 \
            --key-pass pass:AshenFrontier_2026 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --v4-signing-enabled false \
            --out "$FINAL" "$ALIGNED"
          rm -f "$ALIGNED"

      - name: Verify package compatibility and contents
        shell: bash
        run: |
          set -euo pipefail
          OUT='tools/ashen-apk-v121-compat/output'
          APK="$OUT/灰烬边境-v1.2.1-修复安装版.apk"
          INFO="$OUT/安装包验证信息.txt"

          unzip -t "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -c -v 4 "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK" | tee "$INFO"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee -a "$INFO"

          grep -q "package: name='com.wxy.ashenfrontier.compat' versionCode='121' versionName='1.2.1'" "$INFO"
          grep -q "Verified using v1 scheme (JAR signing): true" "$INFO"
          grep -q "Verified using v2 scheme (APK Signature Scheme v2): true" "$INFO"
          grep -q "Verified using v3 scheme (APK Signature Scheme v3): true" "$INFO"
          unzip -l "$APK" | tee -a "$INFO"
          test "$(unzip -p "$APK" 'assets/game/assets/*.js' | wc -c)" -gt 500000

          sha256sum "$APK" > "$OUT/SHA256.txt"
          cat > "$OUT/签名密钥说明.txt" <<'EOF'
          密钥文件：灰烬边境-v1.2.1-签名密钥.jks
          别名：ashenfrontier
          密钥库密码：AshenFrontier_2026
          密钥密码：AshenFrontier_2026
          请保留该密钥，后续升级必须使用同一密钥签名。
          EOF
          cd tools/ashen-apk-v121-compat/work
          zip -qr ../output/灰烬边境-v1.2.1-Android工程源码.zip android

      - name: Upload verified APK
        uses: actions/upload-artifact@v4
        with:
          name: ashen-frontier-v121-compat-verified
          path: tools/ashen-apk-v121-compat/output/*
          if-no-files-found: error
          retention-days: 7
